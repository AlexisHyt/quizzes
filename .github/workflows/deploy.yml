name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 37.59.125.170 >> ~/.ssh/known_hosts
          rsync -avz --delete -e "ssh -vvv -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" ./ debian@37.59.125.170:/home/debian/apps/web/quizzes.alexishayat.me

      - name: Create ENV file
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no debian@37.59.125.170 "
            cd /home/debian/apps/web/quizzes.alexishayat.me &&
            touch .env &&
            echo BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }} >> .env &&
            echo NEXT_PUBLIC_BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }} >> .env &&
            echo BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }} >> .env &&
            echo RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} >> .env &&
            echo DATABASE_URL=${{ secrets.DATABASE_URL }} >> .env &&
            echo NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }} >> .env &&
            echo GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} >> .env &&
            echo GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} >> .env &&
            cat .env
          "

      - name: Build Docker
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no debian@37.59.125.170 "
            cd /home/debian/apps/web/quizzes.alexishayat.me &&
            docker compose build &&
            docker compose up -d
          "

